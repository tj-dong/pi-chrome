<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pi Chrome Connector</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; width: 320px; margin: 0; padding: 12px; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .row { margin: 8px 0; }
    code { font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
    input[type=text] { width: 100%; box-sizing: border-box; padding: 6px; font-family: ui-monospace, Menlo, monospace; }
    button { padding: 6px 10px; cursor: pointer; }
    .ok { color: #16a34a; }
    .warn { color: #d97706; }
    .err { color: #dc2626; }
    .muted { color: #6b7280; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Pi Chrome Connector</h1>
  <div id="status" class="row muted">Loading…</div>
  <div id="paired-info" class="row" hidden>
    <div>Paired ✓</div>
    <div class="muted">extension: <code id="ext-id"></code></div>
    <div class="muted">bridge: <code id="bridge-id"></code></div>
    <div class="row"><button id="unpair-btn">Unpair</button></div>
  </div>
  <div id="pair-form">
    <div class="row">
      Run <code>/chrome pair</code> in your Pi terminal to get an invite, then paste it here:
    </div>
    <div class="row">
      <input id="invite" type="text" placeholder="pcp_..." autofocus />
    </div>
    <div class="row">
      <button id="pair-btn">Pair</button>
    </div>
    <div id="result" class="row"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
